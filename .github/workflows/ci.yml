name: MindVault CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
      redis:
        image: redis:latest
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean compile -DskipTests
        working-directory: backend
        env:
          MONGODB_URI: mongodb://localhost:27017/mindvault_test
          JWT_SECRET: test_jwt_secret_key_for_ci_minimum_32_chars
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Run Tests
        run: mvn test
        working-directory: backend
        env:
          MONGODB_URI: mongodb://localhost:27017/mindvault_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test_jwt_secret_key_for_ci_minimum_32_chars
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
